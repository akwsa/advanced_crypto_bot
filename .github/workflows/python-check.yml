name: Python Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Python syntax
        run: |
          python -m py_compile bot.py
          find analysis api autohunter autotrade cache core scalper signals workers \
            -name "*.py" \
            ! -name "*backup.py" \
            -print0 | xargs -0 python -m py_compile
