<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crypto Trading Dashboard</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <div class="dashboard">
    <!-- LEFT PANEL: Watchlist -->
    <aside class="panel-left">
      <div class="panel-header">
        <h2>📋 Watchlist</h2>
        <span id="pairs-count" class="badge">0</span>
      </div>
      <div class="search-box">
        <input type="text" id="pair-search" placeholder="Cari pair..." />
      </div>
      <ul id="pairs-list" class="pairs-list">
        <li class="loading">Loading...</li>
      </ul>
      <div class="panel-footer">
        <span id="mode-badge" class="mode-badge dryrun">DRY RUN</span>
        <span id="last-update" class="last-update">—</span>
      </div>
    </aside>

    <!-- RIGHT PANEL -->
    <main class="panel-right">
      <!-- TOP: Chart -->
      <section class="chart-section">
        <div class="chart-header">
          <div class="chart-title-group">
            <h2 id="chart-pair">Pilih pair dari watchlist</h2>
            <span id="chart-price" class="chart-price">—</span>
            <span id="chart-change" class="chart-change neutral">—</span>
          </div>
          <div class="chart-controls">
            <div id="chart-timeframes" class="timeframes">
              <button class="tf-btn" data-tf="60" data-limit="120">1m</button>
              <button class="tf-btn" data-tf="300" data-limit="200">5m</button>
              <button class="tf-btn active" data-tf="900" data-limit="200">15m</button>
              <button class="tf-btn" data-tf="3600" data-limit="200">1h</button>
              <button class="tf-btn" data-tf="14400" data-limit="200">4h</button>
              <button class="tf-btn" data-tf="86400" data-limit="200">1D</button>
            </div>
            <select id="chart-type" class="chart-type-select">
              <option value="candle" selected>Candle</option>
              <option value="line">Line</option>
              <option value="area">Area</option>
            </select>
          </div>
        </div>
        <div id="chart-container" class="chart-container"></div>
      </section>

      <!-- BOTTOM: Pair Detail -->
      <section class="detail-section">
        <div class="detail-grid" id="detail-grid">
          <div class="detail-card">
            <span class="detail-label">ML Confidence</span>
            <span class="detail-value" id="d-confidence">—</span>
          </div>
          <div class="detail-card">
            <span class="detail-label">Signal</span>
            <span class="detail-value" id="d-signal">—</span>
          </div>
          <div class="detail-card">
            <span class="detail-label">Combined Strength</span>
            <span class="detail-value" id="d-strength">—</span>
          </div>
          <div class="detail-card">
            <span class="detail-label">Volatilitas</span>
            <span class="detail-value" id="d-volatility">—</span>
          </div>
          <div class="detail-card">
            <span class="detail-label">Volume 24h</span>
            <span class="detail-value" id="d-volume">—</span>
          </div>
          <div class="detail-card">
            <span class="detail-label">Support</span>
            <span class="detail-value" id="d-support">—</span>
          </div>
          <div class="detail-card">
            <span class="detail-label">Resistance</span>
            <span class="detail-value" id="d-resistance">—</span>
          </div>
          <div class="detail-card">
            <span class="detail-label">Risk/Reward</span>
            <span class="detail-value" id="d-rr">—</span>
          </div>
          <div class="detail-card">
            <span class="detail-label">Position</span>
            <span class="detail-value" id="d-position">—</span>
          </div>
          <div class="detail-card">
            <span class="detail-label">P&L</span>
            <span class="detail-value" id="d-pnl">—</span>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
